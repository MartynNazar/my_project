<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <title>Аудіосервер</title>
    <link href="{{url_for('static', path='/audio-server.css')}}" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-2"></div>
            <div class="col-md-8">
                <br><br>
                <div class="div-main">
                    <h1 class="h-txt">Music AutoGura</h1>

                    <form method="post" action="/search_song" id="searchForm">
                        <div class="search-container">
                            <input type="text" name="author_name" class="input_searching" placeholder="Введіть назву автора">
                            <button type="submit" class="button_search">Знайти</button>
                        </div>
                    </form>

                    <div class="text-center">
                        <a href="{{ url_for('main_page') }}"><button class="button_default">Скинути</button></a>
                    </div>

                    <br>
                    {% for song in songs %}
                    <div class="div-song">
                        <div class="container">
                            <div class="row align-items-center">
                                <div class="col-md-9">
                                    <a class="a-song" href="{{ url_for('p_song', song_id=song.id) }}" style="text-decoration: none;">
                                        <p class="p-txt">{{song.author}} — {{song.name}}</p>
                                    </a>
                                </div>
                                <div class="col-md-3 text-right">
                                    <a href="{{ url_for('deleting_song', song_id=song.id) }}">
                                        <button class="button-delete">Видалити</button>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                    {% endfor %}

                    <br>
                    <div class="text-center">
                        <a href="{{ url_for('p_adding') }}"><button class="button_add">+</button></a>
                    </div>
                    <br>
                    <div class="text-center">
                        <a href="{{ url_for('reg_page') }}"><button class="button_log">Увійти</button></a>
                    </div>
                    <br>
                </div>
            </div>
            <div class="col-md-2"></div>
        </div>
    </div>
</body>
</html>
