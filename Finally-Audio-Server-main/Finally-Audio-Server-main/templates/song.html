<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <title>{{ song_correct.name }} - Music AutoGura</title>
    <link rel="stylesheet" href="{{url_for('static', path='/audio-server.css')}}">
</head>
<body>
  <br><br>
  <div class="container">
    <div class="row">
      <div class="col-md-2"></div>
      <div class="col-md-8">
        <div class="main-song">
          <div class="row">
            <div class="col-md-6">
              <br>
              <h2 class="h-txt">{{song_correct.author}}</h2>
              <h3 class="h-txt" style="font-size: 1.5rem; opacity: 0.8;">{{song_correct.name}}</h3>
              <br>
              <p class="p-txt-song">Рік релізу:</p>
              <hr class="hr-song">
              <p class="p-txt-song">{{song_correct.year}}</p>
              <br>
              <p class="p-txt-song">Жанр:</p>
              <hr class="hr-song">
              <p class="p-txt-song">{{song_correct.genre}}</p>
              <br>
            </div>
            <div class="col-md-6 text-center">
              <div class="img-container" style="margin-top: 20px;">
                <img src="{{url_for('static', path='/music.jpg')}}" class="img-fluid img-song" style="max-width: 250px; border-radius: 20px;">
              </div>
            </div>
          </div>

          <br>
          <div class="row">
            <div class="col-md-12">
              <audio src="{{url_for('static', path='/' + song_correct.audio)}}" controls class="audio-song"></audio>
            </div>
          </div>

          <br><br>
          <div class="row text-center">
              <div class="col-md-6">
                  <a href="{{ url_for('main_page') }}">
                      <button class="button-back w-100">Назад</button>
                  </a>
              </div>
              <div class="col-md-6">
                  <a href="{{ url_for('page_change', song_id=song_correct.id) }}">
                      <button class="button-change w-100">Змінити</button>
                  </a>
              </div>
          </div>
          <br>
        </div>
      </div>
      <div class="col-md-2"></div>
    </div>
  </div>
</body>
</html>
